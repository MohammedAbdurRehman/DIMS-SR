# Legacy skeleton — requires genesis blocks, MSP, and channel artifacts under ./fabric-network/
# For a supported path, use Hyperledger Fabric Samples test-network and see fabric/README.md
version: '3.8'

networks:
  fabric-network:
    driver: bridge

services:
  # Orderer
  orderer.dims-sr.local:
    image: hyperledger/fabric-orderer:latest
    environment:
      FABRIC_LOGGING_SPEC: INFO
      ORDERER_GENERAL_LISTENADDRESS: 0.0.0.0
      ORDERER_GENERAL_LISTENPORT: 7050
      ORDERER_GENERAL_GENESISMETHOD: file
      ORDERER_GENERAL_GENESISFILE: /var/hyperledger/orderer/orderer.genesis.block
      ORDERER_GENERAL_LOCALMSPID: OrdererMSP
      ORDERER_GENERAL_LOCALMSPDIR: /var/hyperledger/orderer/msp
    volumes:
      - ./fabric-network/orderer/orderer.genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ./fabric-network/orderer/msp:/var/hyperledger/orderer/msp
      - ./fabric-network/orderer/data:/var/hyperledger/orderer/data
    ports:
      - "7050:7050"
    networks:
      - fabric-network
    command: orderer

  # Organization 1 (Telecom Authority)
  peer0.org1.dims-sr.local:
    image: hyperledger/fabric-peer:latest
    environment:
      FABRIC_LOGGING_SPEC: INFO
      CORE_VM_ENDPOINT: unix:///host/var/run/docker.sock
      CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE: fabric-network
      CORE_PEER_ID: peer0.org1.dims-sr.local
      CORE_PEER_ADDRESS: peer0.org1.dims-sr.local:7051
      CORE_PEER_LISTENADDRESS: 0.0.0.0:7051
      CORE_PEER_CHAINCODEADDRESS: peer0.org1.dims-sr.local:7052
      CORE_PEER_CHAINCODELISTENADDRESS: 0.0.0.0:7052
      CORE_PEER_GOSSIP_BOOTSTRAP: peer0.org1.dims-sr.local:7051
      CORE_PEER_GOSSIP_EXTERNALENDPOINT: peer0.org1.dims-sr.local:7051
      CORE_PEER_LOCALMSPID: Org1MSP
      CORE_PEER_MSPCONFIGPATH: /etc/hyperledger/msp/peer
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./fabric-network/peer0.org1/msp:/etc/hyperledger/msp/peer
    ports:
      - "7051:7051"
    networks:
      - fabric-network
    depends_on:
      - orderer.dims-sr.local
    command: peer node start

  # CouchDB for Org1
  couchdb0:
    image: couchdb:3.1
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: password
    ports:
      - "5984:5984"
    networks:
      - fabric-network

  # CLI for managing network
  cli:
    image: hyperledger/fabric-tools:latest
    tty: true
    environment:
      GOPATH: /opt/gopath
      FABRIC_CFG_PATH: /etc/hyperledger/fabric
      CORE_PEER_ID: cli
      CORE_PEER_ADDRESS: peer0.org1.dims-sr.local:7051
      CORE_PEER_LOCALMSPID: Org1MSP
      CORE_PEER_MSPCONFIGPATH: /etc/hyperledger/msp/users/Admin@org1.dims-sr.local/msp
    volumes:
      - ./fabric-network/peer0.org1/msp:/etc/hyperledger/msp/peer
      - ./chaincode:/opt/gopath/src/github.com/dims-sr/chaincode
      - ./fabric-network/config:/etc/hyperledger/fabric
    networks:
      - fabric-network
    depends_on:
      - orderer.dims-sr.local
      - peer0.org1.dims-sr.local

# Backend API service
  backend:
    build:
      context: ./backend
    image: dims-sr-backend:latest
    container_name: dims-sr-backend
    environment:
      - NODE_ENV=development
      - PORT=3001
      - FABRIC_ENABLED=true
      - FABRIC_CONNECTION_PROFILE_PATH=/app/fabric-connection.json
      - FABRIC_USER_CREDENTIALS_DIR=/app/msp/appUser
      - FABRIC_CHANNEL_NAME=mychannel
      - FABRIC_CHAINCODE_NAME=simregistry
      - FABRIC_DISCOVERY_AS_LOCALHOST=true
      - FIREBASE_CONFIG_PATH=/app/firebase-key.json
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - ./fabric-network/connection-profile.json:/app/fabric-connection.json:ro
      - ./fabric-network/appUser:/app/msp/appUser:ro
      - ./backend/firebase-key.json:/app/firebase-key.json:ro
    networks:
      - fabric-network
    depends_on:
      - peer0.org1.dims-sr.local
      - orderer.dims-sr.local
      - couchdb0
